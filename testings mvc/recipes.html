<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Готварска Книга | Smart Fridge</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <div class="app-layout">
        
        <aside class="sidebar glass-dark">
            <div class="logo">
                <span>⚡ FRIDGE</span> <span style="background:var(--text-main); color:white; padding:2px 6px; border-radius:6px; font-size:12px;">OS</span>
            </div>

            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round">
                        <span class="icon-sun">☀️</span>
                        <span class="icon-moon">🌙</span>
                    </div>
                </label>
            </div>

            <div class="nav-group">
                <a href="index.html" class="menu-btn" style="text-decoration:none;">
                    🏠 <span class="menu-text">Хладилник</span>
                </a>
                <a href="recipes.html" class="menu-btn active" style="text-decoration:none;">
                    📖 <span class="menu-text">Рецепти</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <button id="authBtn" class="auth-btn-side">🔑 <span class="menu-text">Вход</span></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>Готварска Книга 🍳</h1>
                <div class="search-box-neon">
                     <input type="text" id="recipeSearch" placeholder="🔎 Търси рецепта...">
                </div>
            </div>

             <div style="margin-bottom: 20px; display:flex; gap:10px; overflow-x:auto; padding-bottom:5px;">
                <button id="btnFavFilter" class="clear-link" style="background:#ff6b6b; border:none; color:white; padding: 8px 15px; border-radius: 20px; cursor: pointer;">
                    ❤️ Само любими
                </button>
            </div>

            <div id="recipeGrid" class="product-grid">
                <div style="grid-column: 1/-1; text-align:center; padding:20px; color:#888;">
                    Loading recipes... ⏳
                </div>
            </div>
        </main>

        <aside class="right-panel glass-dark" style="justify-content:center; align-items:center; text-align:center; color:var(--text-muted); padding-top:100px;">
            <h2>👨‍🍳 Съвет</h2>
            <p style="margin:20px 0; line-height:1.6;">
                Кликни на сърцето ❤️ върху рецепта, за да я запазиш в "Любими" и да я намираш по-лесно.
            </p>
            <div style="font-size:60px; margin-top:20px; opacity:0.8;">🥗</div>
        </aside>

    </div>

    <div id="authModal" class="modal">
        <div class="modal-content glass-dark">
            <span class="close">&times;</span>
            <div class="auth-tabs">
                <button id="tabLogin" class="auth-tab active">Вход</button>
                <button id="tabRegister" class="auth-tab">Регистрация</button>
            </div>
            <div id="loginForm" class="auth-form-container active">
                <h2 style="text-align:center; color:rgb(0, 0, 0); margin-bottom:20px;">Добре дошъл! 👋</h2>
                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="loginEmail" placeholder="Твоят Email" class="auth-input-modern">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="loginPass" placeholder="Парола" class="auth-input-modern">
                    <i class="fas fa-eye show-pass-btn" id="toggleLoginPass"></i>
                </div>
                <button id="loginSubmitBtn" class="neon-btn-full" style="width:100%; margin-top:20px;">ВЛЕЗ</button>
            </div>
            <div id="registerForm" class="auth-form-container" style="display:none;">
                <h2 style="text-align:center; color:rgb(0, 0, 0); margin-bottom:20px;">Нов профил 🚀</h2>
                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="regEmail" placeholder="Нов Email" class="auth-input-modern">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="regPass" placeholder="Измисли парола" class="auth-input-modern">
                    <i class="fas fa-eye show-pass-btn" id="toggleRegPass"></i>
                </div>
                <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" style="margin-bottom: 15px; display: flex; justify-content: center;"></div>
                <button id="regSubmitBtn" class="neon-btn-full" style="width:100%; margin-top:20px;">РЕГИСТРАЦИЯ</button>
            </div>
        </div>
    </div>

    <button id="mobileCartToggle" style="
        display: none;
        position: fixed;
        bottom: 90px; right: 20px;
        width: 60px; height: 60px;
        background: var(--primary, #FF6B6B);
        color: white;
        border: none; border-radius: 50%;
        box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        z-index: 1500;
        font-size: 24px;
        cursor: pointer;
        align-items: center; justify-content: center;
    ">
        💡
    </button>

    <script type="module" src="./js/main.js"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

</body>
</html>
